{% extends 'base.html' %}

{% block title %}AI Generator - Postless{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto h-full flex flex-col">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">AI Content Generator</h1>
            <p class="text-gray-500 mt-1">Create stunning visuals and engaging captions in seconds.</p>
        </div>
        <div class="flex items-center gap-2 bg-indigo-50 px-4 py-2 rounded-lg text-primary text-sm font-medium">
            <i class="fa-solid fa-bolt"></i>
            <span>850 Credits Available</span>
        </div>
    </div>

    <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-8 min-h-0">
        <!-- Input Panel -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col overflow-hidden">
            <div class="p-4 border-b border-gray-100 bg-gray-50/50">
                <div class="flex gap-4">
                    <button class="flex-1 py-2 text-sm font-medium text-primary border-b-2 border-primary">Image Generation</button>
                    <button class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">Caption Writer</button>
                </div>
            </div>

            <div class="p-6 flex-1 overflow-y-auto space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Prompt</label>
                    <textarea class="w-full h-32 px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/20 focus:border-primary resize-none text-sm" placeholder="Describe the image you want to generate... e.g., A futuristic city with flying cars at sunset, cyberpunk style"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Style</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button class="p-2 border border-primary bg-indigo-50 text-primary rounded-lg text-xs font-medium">Photorealistic</button>
                        <button class="p-2 border border-gray-200 hover:border-gray-300 rounded-lg text-xs font-medium text-gray-600">Cinematic</button>
                        <button class="p-2 border border-gray-200 hover:border-gray-300 rounded-lg text-xs font-medium text-gray-600">3D Render</button>
                        <button class="p-2 border border-gray-200 hover:border-gray-300 rounded-lg text-xs font-medium text-gray-600">Anime</button>
                        <button class="p-2 border border-gray-200 hover:border-gray-300 rounded-lg text-xs font-medium text-gray-600">Oil Painting</button>
                        <button class="p-2 border border-gray-200 hover:border-gray-300 rounded-lg text-xs font-medium text-gray-600">Minimalist</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Aspect Ratio</label>
                    <div class="flex gap-3">
                        <button class="flex-1 py-2 border border-primary bg-indigo-50 text-primary rounded-lg text-xs font-medium flex items-center justify-center gap-2">
                            <div class="w-3 h-3 border border-current"></div> 1:1
                        </button>
                        <button class="flex-1 py-2 border border-gray-200 text-gray-600 rounded-lg text-xs font-medium flex items-center justify-center gap-2">
                            <div class="w-2 h-3 border border-current"></div> 9:16
                        </button>
                        <button class="flex-1 py-2 border border-gray-200 text-gray-600 rounded-lg text-xs font-medium flex items-center justify-center gap-2">
                            <div class="w-4 h-2.5 border border-current"></div> 16:9
                        </button>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-gray-100 bg-gray-50">
                <button class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg font-medium shadow-lg hover:shadow-xl hover:from-indigo-700 hover:to-purple-700 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Generate (2 Credits)
                </button>
            </div>
        </div>

        <!-- Preview Panel -->
        <div class="lg:col-span-2 bg-gray-100 rounded-xl border border-gray-200 border-dashed flex items-center justify-center relative overflow-hidden group">
            <!-- Placeholder State -->
            <div class="text-center">
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                    <i class="fa-solid fa-image text-3xl text-gray-300"></i>
                </div>
                <h3 class="text-lg font-medium text-gray-900">Ready to Create</h3>
                <p class="text-gray-500 text-sm mt-1">Your generated artwork will appear here.</p>
            </div>

            <!-- Result Actions (Hidden by default) -->
            <!--
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                <button class="px-4 py-2 bg-white text-gray-900 rounded-lg shadow-lg text-sm font-medium hover:bg-gray-50">
                    <i class="fa-solid fa-download mr-2"></i> Download
                </button>
                <button class="px-4 py-2 bg-primary text-white rounded-lg shadow-lg text-sm font-medium hover:bg-indigo-600">
                    <i class="fa-solid fa-calendar-plus mr-2"></i> Schedule Post
                </button>
            </div>
            -->
        </div>
    </div>
</div>
{% endblock %}
